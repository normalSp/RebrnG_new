narratives:
  - id: s0.gu.moonlight.claim
    stage: s0
    tags: [narrative, gu, moonlight, claim]
    evidence: canon_inferred
    modes: [canon_strict, sandbox_if]
    text: >-
      你按学堂名册领取月光蛊。负责登记的族人把木匣推到你面前，匣盖内侧刻着编号，旁边还有一行细小的登记痕：姓名、出身、空窍已开、待炼化。

      月光蛊安静伏在匣底，冷意像一枚薄薄的月刃贴着指腹。它不是赏赐，也不是装备；在学堂账册里，它只是家族发给新人的制度资源。拿到手，意味着你被允许进入修行秩序，也意味着损伤、喂养、归属和后续表现都会被追问。

      这一刻没有人恭喜你。登记的人只提醒一句：蛊已领，炼化自理。想让它回应真元，还得把一个自由窗口真正压进空窍里。
  - id: s0.gu.moonlight.refine
    stage: s0
    tags: [narrative, gu, moonlight, refine]
    evidence: canon_inferred
    modes: [canon_strict, sandbox_if]
    text: >-
      你把一段窗口沉进空窍，先以真元试探月光蛊的冷意，再一点点磨去它身上不属于你的抗拒。空窍内壁被牵出细微波纹，月光蛊起初只是沉默，随后才像被某种账契点醒，缓慢向你的真元靠拢。

      炼化归属初成，它从随身之物转入空窍。那一瞬间没有光华冲天，也没有旁人看见你的变化，只有你自己知道：这只蛊终于能被调动，能成为月光修行的中心。

      账本没有把这记成奖励，只记成一只可用之蛊。以后喂养、损伤、战败残蛊、修行消耗，都会从“家族发下”转成“你自己承担”。
  - id: s0.gu.moonlight.inspect
    stage: s0
    tags: [narrative, gu, moonlight, inspect]
    evidence: canon_inferred
    modes: [canon_strict, sandbox_if]
    text: 你把月光蛊的状态重新过账：一转，月道，当前喂养压力尚稳，损伤也未露头。稳不等于无负担，只是这笔账暂时没有追到当前窗口上；以后资源、恢复和路线取舍变窄时，它会换一种方式提醒你。
  - id: s0.scene.opening.academy_gate
    stage: s0
    tags: [narrative, opening, academy]
    evidence: canon_inferred
    modes: [canon_strict, sandbox_if]
    text: >-
      开窍大典已经过去，山寨却没有因此安静下来。昨夜被念出的资质、旁支出身、资源份额和关注目光，像几枚冷硬的竹签，被一起插进你的命里。到了清晨，你站在学堂门前，山雾压着木檐，点卯声还没有响，门内的秩序已经先一步落到账上。

      这里不是避难处。学堂会教你如何催动真元，也会教你如何被比较、被记录、被催促。谁先炼化月光蛊，谁耗掉元石，谁欠了药堂，谁在公开压力前退了一步，都会慢慢变成别人判断你价值的依据。

      风从门缝里穿出来，带着墨、木牌和旧石阶的味道。你还没有真正站稳一转根基，但第一卷的线已经从这里收紧：先活过学堂，再谈山外。
  - id: s0.scene.node.branch_lodging
    stage: s0
    tags: [narrative, scene, branch]
    evidence: canon_inferred
    modes: [canon_strict, sandbox_if]
    text: 旁支落脚点狭窄安静，能藏住一点喘息，也藏不住欠账的影子。
  - id: s0.scene.node.clan_alley_rumor
    stage: s0
    tags: [narrative, scene, alley, rumor]
    evidence: canon_inferred
    modes: [canon_strict, sandbox_if]
    text: 山寨巷道里脚步杂乱，风声混着避让的眼神，能听见门路，也会留下痕迹。
  - id: s0.movement.default
    stage: s0
    tags: [narrative, movement]
    evidence: canon_inferred
    modes: [canon_strict, sandbox_if]
    text: 你换了一个位置，账本只记下路径、时段与暴露，不替你粉饰动机。
  - id: s0.action.cultivate.moonlight
    stage: s0
    tags: [narrative, cultivate, moonlight]
    evidence: canon_inferred
    modes: [canon_strict, sandbox_if]
    text: >-
      你扣下一枚元石，把真元引向空窍里已经炼化的月光蛊。冷白的月意没有替你省下代价，反而把每一次牵引都照得更清楚：元石少了一枚，窗口少了一截，修行痕迹才往前挪动一点。

      月光蛊回应得很稳，却不热切。它只是依照炼化后的归属，把真元磨成更细的月华，再把这点月华压回你的空窍节奏里。你能感觉到根基被垫高了一线，也能感觉到这点进步很快会被学堂里的眼睛看见。

      修行从来不是独处的事。下一次有人问起你的进度，你少了一分空口解释的余地，也多了一分被比较、被推上前台的风险。
  - id: s0.action.cultivate.moonlight_corner
    stage: s0
    tags: [narrative, cultivate, moonlight]
    evidence: canon_inferred
    modes: [canon_strict, sandbox_if]
    text: 你借月光角避开几道视线，把已炼化的月光蛊压进更稳的真元节奏里。这里比学堂前院安静，却不替你免掉消耗；一枚元石从账上划走，月光修行痕迹只向前挪了一寸。
  - id: s0.action.scout.default
    stage: s0
    tags: [narrative, scout]
    evidence: canon_inferred
    modes: [canon_strict, sandbox_if]
    text: 你没有急着下注，先听风声、记人脸。
  - id: s0.action.scout.academy_gate
    stage: s0
    tags: [narrative, scout, academy, blackmarket]
    evidence: canon_inferred
    modes: [canon_strict, sandbox_if]
    text: >-
      你没有急着进门，而是在学堂门前慢慢听风。几个少年压着声音议论昨夜开窍大典的结果，有人提到资质，有人提到旁支，还有人提到方源这个名字后立刻住口，像是怕那两个字带来不该靠近的余波。

      你只把这些记成风声，不把它们写成关系。原著核心人物离你很近，但近不等于可绑、可控、可借势；在严谨模式里，贸然伸手只会更早暴露自己。

      巷道另一端还有人用更低的声音说起“暗口”。这两个字被记进线索页：不是商店，不是机会白送，而是一条可能通向黑市、也可能把尾巴带回来的缝。
  - id: s0.action.scout.moonlight_corner
    stage: s0
    tags: [narrative, scout, moonlight]
    evidence: canon_inferred
    modes: [canon_strict, sandbox_if]
    text: >-
      月光角比学堂前院安静一些，安静不代表安全。你看见几处固定站位：资质好的少年靠近师长视线，旁支和低调者退在边缘，真正有心的人则把每一次催动月光蛊的细节都收进眼底。

      明面规矩只写修行、点卯和考核，暗处的规矩却更锋利：谁先稳住月光蛊，谁元石见底，谁被人激一句就乱了节奏，都会成为后面公开压力的材料。

      你记下这些站位，也记下自己的位置。学堂不是战场，却已经有了阵势。
  - id: s0.action.scout.merit_notice
    stage: s0
    tags: [narrative, scout, merit]
    evidence: canon_inferred
    modes: [canon_strict, sandbox_if]
    text: 你在功绩告示前停下，木牌上每一行任务都压着印记：谁领了、谁交了、谁还欠回报。你记下一点可用功绩，也看见告示旁留给审计的空格。制度内的路更稳，却不是没人盯。
  - id: s0.action.scout.merit_audit
    stage: s0
    tags: [narrative, scout, merit, audit]
    evidence: canon_inferred
    modes: [canon_strict, sandbox_if]
    text: 你顺着功绩告示核对审计缝隙，发现能多记一分机会，也会多留一分痕迹。这里的积累讲规矩，规矩后面是族老、学堂和同辈的眼睛；拿得太急，账会反过来咬人。
  - id: s0.action.scout.infirmary_lane
    stage: s0
    tags: [narrative, scout, infirmary, debt]
    evidence: canon_inferred
    modes: [canon_strict, sandbox_if]
    text: 药堂侧巷药味发苦，价码挂得冷：元石、人情、欠条，哪一种都能治伤，也都会追到后面。你记下恢复门路，同时明白这里不是避风港，只是把伤势换成另一页债。
  - id: s0.action.scout.branch_lodging
    stage: s0
    tags: [narrative, scout, branch, debt]
    evidence: canon_inferred
    modes: [canon_strict, sandbox_if]
    text: 旁支落脚点能挡一时风雨，也把欠账和亲疏写得更清楚。
  - id: s0.action.scout.clan_alley_rumor
    stage: s0
    tags: [narrative, scout, alley, blackmarket]
    evidence: canon_inferred
    modes: [canon_strict, sandbox_if]
    text: 山寨巷道里话音压得很低，有人提到暗口，又立刻换了称呼。你从脚步和眼神里摸到一截黑市门路：不是店铺，不是招牌，是一条会把尾巴带到你身后的缝。
  - id: s0.action.scout.inheritance_rumor
    stage: s0
    tags: [narrative, scout, inheritance, rumor]
    evidence: sandbox_if
    modes: [sandbox_if]
    text: 你查验传承残线，竹影、旧刻痕和传闻彼此对不上，却又都不像全假。它能记进线索页，不能记成收益；越像机会，越要先问自己有没有命把下一段窗口走完。
  - id: s0.action.recover.default
    stage: s0
    tags: [narrative, recover, infirmary]
    evidence: canon_inferred
    modes: [canon_strict, sandbox_if]
    text: 药堂的药敷上去很快发热，疼痛被压下，账也同时落笔。你换来一口喘息，伤势压力被挪成药堂债和人情债；这不是宽恕，只是把催命声推到后面。
  - id: s0.action.recover.heavy_to_light
    stage: s0
    tags: [narrative, recover, infirmary, injury]
    evidence: canon_inferred
    modes: [canon_strict, sandbox_if]
    text: 药堂把重伤压回轻伤，血腥味被药味盖住，身体终于能听你使唤。代价没有消失，药童在账册边角添了一笔，你以后每次经过这里都会被那一眼认出来。
  - id: s0.action.recover.light_to_healthy
    stage: s0
    tags: [narrative, recover, infirmary, injury]
    evidence: canon_inferred
    modes: [canon_strict, sandbox_if]
    text: 轻伤被处理干净，行动重新顺手。药堂没有多问你的来路，只把药资和人情记得分明；账面变整齐了，后面的追索也更清楚了。
  - id: s0.action.trade.blackmarket_hint
    stage: s0
    tags: [narrative, trade, blackmarket]
    evidence: gameplay_extrapolated
    modes: [canon_strict, sandbox_if]
    text: 你在黑市暗口用元石换来材料，交易短得像一次错身。对方不问姓名，却记住了你的声音和迟疑；材料入袋，暴露也跟着上涨。
  - id: s0.encounter.blackmarket_extortion.trigger
    stage: s0
    tags: [narrative, encounter, blackmarket, extortion]
    evidence: gameplay_extrapolated
    modes: [canon_strict, sandbox_if]
    text: 深夜的暗口没有招牌，只有墙根处忽然停下的脚步。两道人影堵住退路，开口不是报价，而是要你交出身上值钱的东西；黑市还没给机会，先把勒索摆到面前。
  - id: s0.encounter.blackmarket_extortion.retreat
    stage: s0
    tags: [narrative, encounter, retreat]
    evidence: gameplay_extrapolated
    modes: [canon_strict, sandbox_if]
    text: 你没有逞强，借巷道阴影抽身后撤。背后传来低笑，脸面和掩护都折了一截，但筋骨还在，月光蛊也还在；活着离开，本身就是这一晚最实在的收益。
  - id: s0.encounter.blackmarket_extortion.confront
    stage: s0
    tags: [narrative, encounter, confront]
    evidence: gameplay_extrapolated
    modes: [canon_strict, sandbox_if]
    text: 你硬顶勒索，真元和胆气都顶上去，结果换来的不是胜利，而是一记更重的教训。元石被榨去，伤势压进身体，暗口的人也记住你不是好捏的，但这份记住未必是好事。
  - id: s0.encounter.academy_public_pressure.trigger
    stage: s0
    tags: [narrative, encounter, academy, public_pressure]
    evidence: canon_inferred
    modes: [canon_strict, sandbox_if]
    text: >-
      月光修行的痕迹一深，学堂里的目光就开始聚拢。先是几道视线落在你的袖口和空窍节奏上，随后有人故意把话说得很响，像是在替众人把疑问钉到你身上：旁支也想抢进度？

      这不是正式惩戒，师长甚至可以装作没有听见。但公开压力最毒的地方就在这里：没人下令，你却必须反应；没人出手，你的名声已经被推到众人面前。

      你可以忍让、争辩，也可以硬顶。每一种选择都不是胜利，只是把今天的代价换成不同形状的后账。
  - id: s0.encounter.academy_public_pressure.yield
    stage: s0
    tags: [narrative, encounter, academy, yield]
    evidence: canon_inferred
    modes: [canon_strict, sandbox_if]
    text: >-
      你垂下眼，忍下那句刺耳的话。周围有轻笑掠过，像冷水一样贴在后颈；有人以为你软，也有人只是确认你暂时不会把局面闹大。

      忍让保住了当前窗口，没有把师长的目光直接引下来，也没有把对方推到必须升级冲突的位置。可名声已经被踩出一道浅痕，浅到没人会替你记仇，深到下一次有人试探时会先想起今天。

      这不是失败结算，是生存账。你把当场风险压低，也把后续被轻视的压力背到了下一页。
  - id: s0.encounter.academy_public_pressure.argue
    stage: s0
    tags: [narrative, encounter, academy, argue]
    evidence: canon_inferred
    modes: [canon_strict, sandbox_if]
    text: >-
      你压低声音回了一句，没有让话题炸开，只把对方递来的刺挡回去半寸。对方一时找不到更好借口，笑声也短了一拍。

      但学堂里最不缺的就是耳朵。旁人都听见了你的不顺从，也看见你没有被第一句话压下去。争辩没有让你赢，它只是让账本多了一条“会顶嘴”的注脚。

      这条注脚有时能挡住小麻烦，有时也会引来更正式的盯防。你换回一点体面，同时把自己写得更显眼。
  - id: s0.encounter.academy_public_pressure.confront
    stage: s0
    tags: [narrative, encounter, academy, confront]
    evidence: canon_inferred
    modes: [canon_strict, sandbox_if]
    text: >-
      你硬撑住对练和羞辱，咬牙不退。真元在空窍里顶得发涩，月光蛊也被迫跟着绷紧，像一根被拉到极限的弦。

      那一刻没人能说你软弱，甚至有人会把目光收回去半寸。可身体替你记下代价，后续窗口也被压得更窄；公开硬顶能止住一口气，却换不来真正安全。

      学堂会记住两件事：你能顶，也会伤。前者让人忌惮，后者让人知道下一次该从哪里下手。
  - id: s0.encounter.alley_probe.trigger
    stage: s0
    tags: [narrative, encounter, alley, probe]
    evidence: gameplay_extrapolated
    modes: [canon_strict, sandbox_if]
    text: 巷道里的脚步慢了半拍，有人像是在试探你身后的尾巴。
  - id: s0.encounter.alley_probe.retreat
    stage: s0
    tags: [narrative, encounter, alley, retreat]
    evidence: gameplay_extrapolated
    modes: [canon_strict, sandbox_if]
    text: 你退得很快，断尾保身，账上只多一笔暴露。
  - id: s0.encounter.alley_probe.delay
    stage: s0
    tags: [narrative, encounter, alley, delay]
    evidence: gameplay_extrapolated
    modes: [canon_strict, sandbox_if]
    text: 你拖住话头，让对方摸不准你的底，时间替你撬开一条缝。
  - id: s0.encounter.alley_probe.frame
    stage: s0
    tags: [narrative, encounter, alley, frame]
    evidence: gameplay_extrapolated
    modes: [canon_strict, sandbox_if]
    text: 你把尾巴甩向旁人，眼前脱身，后账却不会就此消失。
  - id: s0.encounter.alley_probe.confront
    stage: s0
    tags: [narrative, encounter, alley, confront]
    evidence: gameplay_extrapolated
    modes: [canon_strict, sandbox_if]
    text: 你硬顶巷道试探，带伤脱身，也把自己写进更多眼睛里。
  - id: s0.action.wait.default
    stage: s0
    tags: [narrative, wait]
    evidence: canon_inferred
    modes: [canon_strict, sandbox_if]
    text: 你把这个时段耗过去，未用 AP 不会结转。
